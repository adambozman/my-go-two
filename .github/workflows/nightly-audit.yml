name: Nightly Full Audit

on:
  # Disabled automatic runs per request; manual dispatch only.
  workflow_dispatch:

env:
  NODE_VERSION: 20
  STALENESS_DAYS: 90

jobs:
  code-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test -- --runInBand
      - name: npm audit (non-blocking)
        run: |
          mkdir -p artifacts
          npm audit --audit-level=moderate || true | tee artifacts/npm-audit.log
      - uses: actions/upload-artifact@v4
        with:
          name: code-health
          path: artifacts

  supabase-schema:
    runs-on: ubuntu-latest
    needs: code-health
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_READONLY }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure DB URL present
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "SUPABASE_DB_URL_READONLY secret is required." >&2
            exit 1
          fi
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Dump live schema
        run: |
          mkdir -p supabase/.temp artifacts
          pg_dump --schema=public --schema-only --file=supabase/.temp/live_schema.sql "${SUPABASE_DB_URL}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install JS deps
        run: npm ci --prefer-offline
      - name: Schema drift scan
        run: |
          node scripts/audit-supabase.js \
            --live supabase/.temp/live_schema.sql \
            --migrations supabase/migrations \
            --code src \
            --functions supabase/functions \
            --out supabase/.temp/schema-report.json
        continue-on-error: false
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-schema
          path: |
            supabase/.temp/live_schema.sql
            supabase/.temp/schema-report.json

  supabase-data:
    runs-on: ubuntu-latest
    needs: supabase-schema
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_READONLY }}
      STALENESS_DAYS: ${{ env.STALENESS_DAYS }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure DB URL present
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "SUPABASE_DB_URL_READONLY secret is required." >&2
            exit 1
          fi
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Data quality checks
        run: |
          mkdir -p artifacts
          PGOPTIONS="-c staleness.days=${STALENESS_DAYS}" \
          psql "${SUPABASE_DB_URL}" \
            -v ON_ERROR_STOP=1 \
            -f scripts/sql-checks/data_quality.sql \
            2>&1 | tee artifacts/data-quality.log
      - uses: actions/upload-artifact@v4
        with:
          name: supabase-data
          path: artifacts/data-quality.log

  supabase-functions-security:
    runs-on: ubuntu-latest
    needs: supabase-schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Install JS deps
        run: npm ci --prefer-offline
      - name: Deno lint edge functions
        run: deno lint supabase/functions
      - name: Static security audit
        run: |
          mkdir -p artifacts
          node scripts/audit-edge-functions.js | tee artifacts/functions-security.json
      - uses: actions/upload-artifact@v4
        with:
          name: supabase-functions-security
          path: artifacts

  report:
    runs-on: ubuntu-latest
    needs:
      - code-health
      - supabase-schema
      - supabase-data
      - supabase-functions-security
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Build audit report
        run: |
          REPORT=audit-report.md
          echo "# Nightly Audit Report" > "$REPORT"
          echo "" >> "$REPORT"
          echo "## Code Health" >> "$REPORT"
          if [ -f artifacts/code-health/npm-audit.log ]; then
            echo "npm audit (warnings only):" >> "$REPORT"
            sed -n '1,120p' artifacts/code-health/npm-audit.log >> "$REPORT"
          else
            echo "Artifacts missing; see workflow logs." >> "$REPORT"
          fi
          echo "" >> "$REPORT"
          echo "## Supabase Schema Drift" >> "$REPORT"
          if [ -f artifacts/supabase-schema/schema-report.json ]; then
            node --input-type=module -e "import fs from 'fs'; const r=JSON.parse(fs.readFileSync('./artifacts/supabase-schema/schema-report.json','utf8')); console.log(JSON.stringify(r.summary,null,2));" >> "$REPORT"
          fi
          echo "" >> "$REPORT"
          echo "## Data Quality" >> "$REPORT"
          if [ -f artifacts/supabase-data/data-quality.log ]; then
            sed -n '1,160p' artifacts/supabase-data/data-quality.log >> "$REPORT"
          fi
          echo "" >> "$REPORT"
          echo "## Edge Functions Security" >> "$REPORT"
          if [ -f artifacts/supabase-functions-security/functions-security.json ]; then
            node --input-type=module -e "import fs from 'fs'; const r=JSON.parse(fs.readFileSync('./artifacts/supabase-functions-security/functions-security.json','utf8')); console.log(JSON.stringify(r.issues,null,2));" >> "$REPORT"
          fi
          echo "" >> "$REPORT"
          echo "Generated at $(date -u +"%Y-%m-%d %H:%M:%SZ")" >> "$REPORT"
      - uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.md
      - name: Slack notification (optional)
        if: env.SLACK_WEBHOOK != ''
        run: |
          SUMMARY="$(head -n 30 audit-report.md)"
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"Nightly audit completed.\n\`\`\`${SUMMARY}\`\`\`\"}" "$SLACK_WEBHOOK"
